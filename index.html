<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    
    <script>
        window.pixelId = "69c9c9fd148ee9ff59fc853d";
        var a = document.createElement("script");
        a.setAttribute("async", "");
        a.setAttribute("defer", "");
        a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
        document.head.appendChild(a);
    </script>
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>
    
    <style>
        /* Estilo visual focado em conversão e carregamento rápido */
        body { 
            background: #0f111a; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            flex-direction: column; 
            user-select: none; 
        }
        
        /* A Bola Girando (Spinner) */
        .spinner { 
            width: 45px; 
            height: 45px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: #2AABEE; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin-bottom: 25px; 
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        h3 { 
            font-weight: 500; 
            font-size: 18px;
            letter-spacing: 0.5px; 
            color: #e0e0e0;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    
    <div class="spinner"></div>
    <h3>Conectando ao Telegram...</h3>
    
    <script>
        // 🛡️ SEGURANÇA 1: Anti-Automação (WebDrivers)
        if (navigator.webdriver) { 
            window.location.href = "https://www.google.com"; 
        }

        // 🚨 CONFIGURAÇÕES DO SISTEMA
        const N8N_URL = atob("aHR0cHM6Ly9uOG4ubGliZXJhZGluaG8uc2hvcC93ZWJob29rL3NhdmUtdHJhY2tpbmc="); 
        const BOT_USER = "ALICEXOTAFOFA_BOT";
        
        // 🥷 CONFIGURAÇÕES DO CLOAKER (ANTI-CLONAGEM / ESPIONAGEM)
        const CHAVE_SECRETA = "shk";
        const VALOR_SECRETO = "cfbsup6t";
        const SITE_ESPIAO = "https://www.youtube.com/watch?v=QqDT_Dn2gYo"; // Para onde mandar os curiosos e analistas do Facebook

        async function fetchWithTimeout(url, timeoutMs = 1500) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return response;
        }

        async function go() {
            const params = new URLSearchParams(window.location.search);
            const data = {};
            
            // Captura tudo da URL
            params.forEach((val, key) => { data[key] = val });

            // 🥷 SISTEMA CLOAKER: A Mágica Acontece Aqui
            // Se a chave "shk" não existir OU for diferente de "cfbsup6t", tchau espião!
            if (data[CHAVE_SECRETA] !== VALOR_SECRETO) {
                window.location.href = SITE_ESPIAO;
                return; // Encerra o script na hora
            }

            // Se passou do cloaker e não tiver UTM, redireciona para tráfego orgânico
            if (!data.utm_source && !data.fbclid) {
                window.location.href = `https://t.me/${BOT_USER}?start=organic`;
                return;
            }

            try {
                // 🦈 MODO TUBARÃO: Captura o Dispositivo
                data.user_agent = navigator.userAgent;

                // ⚡ VELOCIDADE: Tenta buscar IP/Cidade.
                try {
                    const geoReq = await fetchWithTimeout("https://ipwho.is/", 1500);
                    const geoRes = await geoReq.json();
                    
                    if(geoRes.success) {
                        data.ip = geoRes.ip;
                        data.cidade = geoRes.city;
                        data.estado = geoRes.region;
                        data.pais = geoRes.country;
                    }
                } catch(e) {
                    console.warn("API de IP lenta, seguindo fluxo...");
                }

                // Dispara pro N8N
                const req = await fetch(N8N_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const res = await req.json();
                
                if (res.code) {
                    window.location.href = `https://t.me/${BOT_USER}?start=${res.code}`;
                } else {
                    throw new Error("Sem código");
                }
            } catch (e) {
                // Fallback de erro
                const erroMsg = encodeURIComponent(e.message || "desconhecido");
                window.location.href = `https://t.me/${BOT_USER}?start=fallback_error_${erroMsg}`;
            }
        }
        
        go();
    </script>
</body>
</html>
